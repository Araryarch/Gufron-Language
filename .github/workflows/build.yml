name: Build GFR Compiler

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build binaries
        run: npx pkg . --targets node18-linux-x64,node18-macos-x64,node18-win-x64 --out-path dist

      - name: Rename binaries
        run: |
          mv dist/gufron-lang-linux dist/gfr-linux || true
          mv dist/gufron-lang-macos dist/gfr-macos || true
          mv dist/gufron-lang-win.exe dist/gfr-win.exe || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gfr-binaries
          path: dist/

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: GFR Compiler Build ${{ github.run_number }}
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
